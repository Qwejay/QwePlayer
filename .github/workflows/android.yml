name: Android Auto Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code (Excluding LFS)
      uses: actions/checkout@v4
      with:
        lfs: false

    - name: Generate LFS File List
      run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id

    - name: Restore Git LFS Cache
      uses: actions/cache@v4
      id: lfs-cache
      with:
        path: .git/lfs
        key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}
        restore-keys: |
          ${{ runner.os }}-lfs-

    - name: Pull LFS Files
      run: |
        git lfs fetch
        git lfs checkout

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Rename and Standardize APK Name
      run: |
        APK_DIR="app/build/outputs/apk/debug"
        if [ -f "$APK_DIR/app-debug.apk" ]; then
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            mv "$APK_DIR/app-debug.apk" "$APK_DIR/QwePlayer_${{ github.ref_name }}.apk"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            mv "$APK_DIR/app-debug.apk" "$APK_DIR/QwePlayer_${{ github.ref_name }}_${SHORT_SHA}.apk"
          fi
          echo "Successfully renamed APK to standard format."
        else
          echo "Error: app-debug.apk not found. Skipping rename."
        fi

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: qwe-player-apk
        path: app/build/outputs/apk/debug/*.apk

    - name: Create and Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/*.apk
        name: "QwePlayer Release ${{ github.ref_name }}"
        body: |
          这是由 GitHub Actions 自动构建并发布的版本。
          包含最新代码变更与离线 AI 语音识别模型。
        draft: false
        prerelease: false